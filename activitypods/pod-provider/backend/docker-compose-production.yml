version: '3.8'

services:
  # Fuseki Triplestore
  fuseki:
    image: apache/jena-fuseki:4.7.0
    container_name: activitypods-fuseki
    ports:
      - "3030:3030"
    environment:
      - FUSEKI_DATASET_1=activitypods
      - FUSEKI_DATASET_1_TDB2=true
      - ADMIN_PASSWORD=your-secure-admin-password
    volumes:
      - fuseki-data:/fuseki/databases
      - ./docker/fuseki-config.ttl:/fuseki/config/activitypods-config.ttl
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: activitypods-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ActivityPods Backend
  activitypods-backend:
    build:
      context: ../../
      dockerfile: activitypods/pod-provider/backend/docker/backend.dockerfile
    container_name: activitypods-backend
    ports:
      - "3000:3000"
      - "3001:3001"  # Firehose WebSocket
    environment:
      - NODE_ENV=production
      - BASE_URL=https://your-domain.com
      - FRONTEND_URL=https://your-domain.com
      - JWT_SECRET=your-super-secure-jwt-secret
      - FUSEKI_URL=http://fuseki:3030
      - REDIS_URL=redis://redis:6379
      - FIREHOSE_PORT=3001
      - APPVIEW_SERVER=bsky.social
      - ENABLE_FEDERATION=true
      - ENABLE_FIREHOSE=true
      - ENABLE_APPVIEW=true
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - fuseki
      - redis
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: activitypods-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - activitypods-backend
    restart: unless-stopped

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: activitypods-certbot
    volumes:
      - ./docker/ssl:/etc/letsencrypt
      - ./docker/ssl:/var/lib/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/html --email your-email@example.com --agree-tos --no-eff-email -d your-domain.com

volumes:
  fuseki-data:
  redis-data: 